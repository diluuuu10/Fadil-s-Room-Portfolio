<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fadil's Room Portfolio</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Loading Screen — Win95 boot style -->
    <div id="loader" class="loader" role="status" aria-live="polite">
      <!-- BIOS strip at top -->
      <div class="loaderBios" aria-hidden="true">
        <div class="loaderBiosLogo">
          <span class="biosFlag">⊞</span>
          <span class="biosBrand">Room<b>95</b></span>
        </div>
        <div class="loaderBiosText">
          <div>Award Modular BIOS v4.51PG, An Energy Star Ally</div>
          <div>Copyright (C) 1984-1999, Award Software, Inc.</div>
        </div>
      </div>

      <div class="loaderCard" aria-label="Loading">
        <!-- Big Win95 splash logo -->
        <div class="loaderLogo" aria-hidden="true">
          <div class="loaderFlag">
            <span class="flagQ red"></span><span class="flagQ green"></span>
            <span class="flagQ blue"></span><span class="flagQ yellow"></span>
          </div>
          <div class="loaderBrand">
            <span class="brandRoom">Room</span><span class="brandNum">95</span>
          </div>
        </div>

        <div class="loaderName">Starting Room95...</div>

        <!-- Win95-style segmented progress bar -->
        <div class="loaderRow">
          <div class="loaderMeter" aria-label="Loading progress">
            <div id="loaderBar" class="loaderBar"></div>
          </div>
          <div id="loaderPct" class="loaderPct">0%</div>
        </div>

        <div id="loaderHint" class="loaderHint">Booting RoomOS...</div>

        <button
          id="loaderStart"
          class="loaderStart is-hidden"
          type="button"
          aria-hidden="true"
        >
          ►  Enter Room
        </button>

        <div class="loaderFoot" aria-hidden="true">
          Press <kbd>Enter</kbd> to continue
        </div>
      </div>

      <!-- Bottom hint strip -->
      <div class="loaderBottom" aria-hidden="true">
        <span class="loaderBlink">_</span>
        <span class="loaderBottomText">Press DEL to enter SETUP, F12 for Boot Menu</span>
      </div>
    </div>

    <!-- UI overlay (navbar) -->
    <nav class="topNav" aria-label="Room navigation">
      <div class="navGroup">
        <button id="navAbout" class="navBtn" type="button">
          <span class="navIcon">📺</span>
          <span class="navText">About Me</span>
        </button>

        <button id="navShop" class="navBtn" type="button">
          <span class="navIcon">🖥️</span>
          <span class="navText">Shop</span>
        </button>

        <button
          id="nightToggle"
          class="navBtn themeBtn"
          type="button"
          aria-label="Toggle day/night mode"
          title="Day/Night"
        >
          <span class="themeInner" aria-hidden="true">
            <span class="icon sun">☀️</span>
            <span class="icon moon">🌙</span>
          </span>
          <span class="srOnly">Toggle day/night</span>
        </button>
      </div>
    </nav>

    <div id="css-tv" class="css-layer"></div>

    <canvas class="webgl"></canvas>

    <button
      id="resetCam"
      class="resetCam is-hidden"
      type="button"
      aria-label="Reset camera view"
      title="Reset view"
    >
      <span class="resetIcon" aria-hidden="true">↩</span>
      <span class="resetText">Back to Room</span>
    </button>

    <script type="module" src="./script.js"></script>
  </body>
</html>
